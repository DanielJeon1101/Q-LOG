<script>
let logs = [];
let selectedMood = "";

let saved = localStorage.getItem('logs');
if(saved) logs = JSON.parse(saved);

function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

setInterval(()=>{
    document.getElementById('time').innerText =
        new Date().toLocaleTimeString();
},1000);

// ✅ 🔥 핵심 (Firebase + localStorage 동시 저장)
function saveLog(){
    let text = document.getElementById('text').value;
    if(!text) return alert("내용 입력하세요");

    const logData = {
        mood: "🙂",
        text: text,
        date: new Date().toISOString()
    };

    // 기존 저장
    logs.push({
        ...logData,
        date: new Date()
    });
    localStorage.setItem('logs', JSON.stringify(logs));

    // 🔥 Firebase 저장
    const diaryRef = window.ref(window.db, "diaries");
    const newRef = window.push(diaryRef);

    window.set(newRef, logData);

    document.getElementById('text').value="";
    go('home');
    renderLogs();
}

function renderLogs(){
    let list = document.getElementById('logList');
    list.innerHTML="";
    logs.forEach(l=>{
        let div = document.createElement('div');
        div.className='card';
        div.innerText = `${l.mood} ${l.text}`;
        list.appendChild(div);
    });
}

/* ✅ 통계 (텍스트 기반으로 변경) */
function renderStats(){
    let counts = {};
    let tagCounts = {};

    logs.forEach(l=>{
        counts[l.mood] = (counts[l.mood] || 0) + 1;

        let tags = l.text.match(/#\w+/g);
        if(tags){
            tags.forEach(t=>{
                tagCounts[t] = (tagCounts[t] || 0) + 1;
            });
        }
    });

    let moodSorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    let tagSorted = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]);

    let html = "<h3>📌 감정 통계</h3>";
    moodSorted.forEach(([m,c],i)=>{
        html += `${i+1}. ${m} : ${c}회<br>`;
    });

    html += "<br><h3>📌 태그 통계</h3>";
    tagSorted.forEach(([t,c],i)=>{
        html += `${i+1}. ${t} : ${c}회<br>`;
    });

    document.getElementById('statsBox').innerHTML = html || "데이터 없음";
}
