<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Q-Log · 비밀번호 찾기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --primary-blue: #3182f6;
    --primary-blue-hover: #1b64da;
    --bg-color: #f2f4f6;
    --app-bg: #ffffff;
    --text-main: #191f28;
    --text-sub: #8b95a1;
    --border-color: #e5e8eb;
    --error-color: #f03e3e;
    --success-color: #20c997;
    --border-radius-lg: 24px;
    --border-radius-md: 16px;
    --border-radius-sm: 8px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

  body {
    background: var(--bg-color);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: var(--text-main);
  }

  .app-container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--app-bg);
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 상단 헤더 ── */
  .top-header {
    display: flex;
    align-items: center;
    padding: 20px 24px 0;
    gap: 12px;
    animation: fadeDown 0.4s ease both;
  }
  .back-btn {
    width: 40px; height: 40px;
    border: none; background: var(--bg-color);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-main);
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .back-btn:hover { background: #e5e8eb; }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  /* ── 단계 표시 ── */
  .step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 28px 24px 0;
    animation: fadeDown 0.4s ease 0.05s both;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border-color);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    background: white;
    transition: all 0.4s ease;
    position: relative;
    z-index: 1;
  }
  .step-dot.active {
    border-color: var(--primary-blue);
    background: var(--primary-blue);
    color: white;
    box-shadow: 0 0 0 4px rgba(49,130,246,0.15);
  }
  .step-dot.done {
    border-color: var(--success-color);
    background: var(--success-color);
    color: white;
  }
  .step-dot.done::after {
    content: '✓';
    font-size: 13px;
  }
  .step-line {
    flex: 1;
    max-width: 64px;
    height: 2px;
    background: var(--border-color);
    transition: background 0.4s ease;
    margin: 0 4px;
  }
  .step-line.done { background: var(--success-color); }

  .step-labels {
    display: flex;
    justify-content: space-between;
    padding: 8px 24px 0;
    animation: fadeDown 0.4s ease 0.05s both;
  }
  .step-label {
    font-size: 11px;
    color: var(--text-sub);
    text-align: center;
    width: 60px;
    transition: color 0.3s;
  }
  .step-label.active { color: var(--primary-blue); font-weight: 600; }
  .step-label.done   { color: var(--success-color); }

  /* ── 단계 패널 ── */
  .panels {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .panel {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 36px 24px 40px;
    opacity: 0;
    transform: translateX(40px);
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .panel.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    position: relative;
  }
  .panel.exit {
    opacity: 0;
    transform: translateX(-40px);
  }

  /* ── 패널 내용 ── */
  .panel-icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
  }
  .panel-icon.blue { background: #e8f1ff; }
  .panel-icon.green { background: #e6fcf5; }
  .panel-icon.orange { background: #fff4e6; }

  .panel-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 8px;
  }
  .panel-desc {
    font-size: 14px;
    color: var(--text-sub);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .panel-desc strong { color: var(--primary-blue); }

  /* ── 입력 필드 ── */
  .field-wrap {
    position: relative;
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .field-icon {
    position: absolute;
    left: 16px;
    color: var(--text-sub);
    font-size: 16px;
    pointer-events: none;
    transition: color 0.2s;
  }
  .field-wrap:focus-within .field-icon { color: var(--primary-blue); }

  input[type="email"],
  input[type="text"],
  input[type="password"],
  input[type="number"] {
    width: 100%;
    height: 52px;
    padding: 0 16px 0 44px;
    border: 1.5px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    font-size: 15px;
    color: var(--text-main);
    background: white;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: var(--text-sub); }
  input:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 3px rgba(49,130,246,0.12);
  }
  input.error-field {
    border-color: var(--error-color);
    box-shadow: 0 0 0 3px rgba(240,62,62,0.1);
  }
  input.ok-field {
    border-color: var(--success-color);
    box-shadow: 0 0 0 3px rgba(32,201,151,0.1);
  }

  .field-message {
    font-size: 12px;
    padding-left: 4px;
    margin-top: -4px;
    margin-bottom: 8px;
    min-height: 16px;
  }
  .field-message.error { color: var(--error-color); }
  .field-message.ok    { color: var(--success-color); }

  .toggle-pw {
    position: absolute;
    right: 14px;
    background: none; border: none;
    cursor: pointer;
    color: var(--text-sub);
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--text-main); }

  /* OTP 인풋 */
  .otp-wrap {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .otp-input {
    width: 52px !important;
    height: 60px !important;
    text-align: center;
    font-size: 24px !important;
    font-weight: 700;
    padding: 0 !important;
    border-radius: var(--border-radius-sm) !important;
    letter-spacing: 0;
  }

  /* 타이머 */
  .timer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .timer-text { color: var(--text-sub); }
  .timer-count {
    font-weight: 700;
    color: var(--primary-blue);
    min-width: 40px;
    text-align: right;
  }
  .timer-count.expired { color: var(--error-color); }
  .resend-btn {
    background: none; border: none;
    color: var(--primary-blue);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .resend-btn:disabled { color: var(--text-sub); cursor: not-allowed; }

  /* 비번 강도 바 */
  .pw-strength-bar {
    height: 3px; border-radius: 2px;
    background: var(--border-color);
    margin-bottom: 6px; overflow: hidden;
  }
  .pw-strength-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .pw-strength-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* 버튼 */
  .btn-primary {
    width: 100%; height: 52px;
    border: none;
    border-radius: var(--border-radius-sm);
    background: var(--primary-blue);
    color: white;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(49,130,246,0.28);
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
  }
  .btn-primary:hover { background: var(--primary-blue-hover); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    background: #b0c4e8; box-shadow: none; cursor: not-allowed;
  }
  .btn-primary.green-btn {
    background: var(--success-color);
    box-shadow: 0 4px 12px rgba(32,201,151,0.3);
  }
  .btn-primary.green-btn:hover { background: #12b886; }

  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 성공 화면 */
  .success-circle {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, #e6fcf5, #c3fae8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 44px;
    animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* 뒤로가기 링크 */
  .back-to-login {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-sub);
  }
  .back-to-login a {
    color: var(--primary-blue);
    font-weight: 600;
    text-decoration: none;
  }
  .back-to-login a:hover { text-decoration: underline; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-main);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="app-container">

  <!-- 헤더 -->
  <div class="top-header">
    <button class="back-btn" id="backBtn" onclick="handleBack()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <span class="header-title">비밀번호 찾기</span>
  </div>

  <!-- 단계 표시 -->
  <div class="step-indicator">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3">3</div>
  </div>
  <div class="step-labels">
    <span class="step-label active" id="lbl1">이메일 확인</span>
    <span class="step-label" id="lbl2">인증 코드</span>
    <span class="step-label" id="lbl3">새 비밀번호</span>
  </div>

  <!-- 패널 영역 -->
  <div class="panels">

    <!-- STEP 1: 이메일 입력 -->
    <div class="panel active" id="panel1">
      <div class="panel-icon blue">📧</div>
      <div class="panel-title">이메일을 입력하세요</div>
      <div class="panel-desc">가입 시 사용한 이메일 주소를 입력하면<br>인증 코드를 보내드립니다.</div>

      <div class="field-wrap">
        <input type="email" id="emailInput" placeholder="이메일 주소" oninput="onEmailInput()">
        <i class="fa-solid fa-envelope field-icon"></i>
      </div>
      <div class="field-message" id="emailMsg"></div>

      <button class="btn-primary" id="sendBtn" onclick="sendCode()" style="margin-top:12px;">
        <span id="sendLabel">인증 코드 보내기</span>
        <div class="spinner" id="sendSpinner"></div>
      </button>

      <div class="back-to-login" style="margin-top:24px;">
        <a href="login.html">← 로그인으로 돌아가기</a>
      </div>
    </div>

    <!-- STEP 2: OTP 인증 -->
    <div class="panel" id="panel2">
      <div class="panel-icon orange">🔐</div>
      <div class="panel-title">인증 코드 입력</div>
      <div class="panel-desc" id="otpDesc">
        <strong id="otpEmail"></strong>로 전송된<br>6자리 인증 코드를 입력하세요.
      </div>

      <div class="otp-wrap" id="otpWrap">
        <input class="otp-input" type="number" maxlength="1" id="otp0" oninput="onOtpInput(0)" onkeydown="onOtpKeydown(event,0)">
        <input class="otp-input" type="number" maxlength="1" id="otp1" oninput="onOtpInput(1)" onkeydown="onOtpKeydown(event,1)">
        <input class="otp-input" type="number" maxlength="1" id="otp2" oninput="onOtpInput(2)" onkeydown="onOtpKeydown(event,2)">
        <input class="otp-input" type="number" maxlength="1" id="otp3" oninput="onOtpInput(3)" onkeydown="onOtpKeydown(event,3)">
        <input class="otp-input" type="number" maxlength="1" id="otp4" oninput="onOtpInput(4)" onkeydown="onOtpKeydown(event,4)">
        <input class="otp-input" type="number" maxlength="1" id="otp5" oninput="onOtpInput(5)" onkeydown="onOtpKeydown(event,5)">
      </div>
      <div class="field-message" id="otpMsg"></div>

      <div class="timer-row">
        <span class="timer-text">유효 시간</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="resend-btn" id="resendBtn" onclick="resendCode()" disabled>재전송</button>
          <span class="timer-count" id="timerCount">3:00</span>
        </div>
      </div>

      <button class="btn-primary" id="verifyBtn" onclick="verifyCode()">
        <span id="verifyLabel">확인</span>
        <div class="spinner" id="verifySpinner"></div>
      </button>
    </div>

    <!-- STEP 3: 새 비밀번호 -->
    <div class="panel" id="panel3">
      <div class="panel-icon blue">🔑</div>
      <div class="panel-title">새 비밀번호 설정</div>
      <div class="panel-desc">이전과 다른 새로운 비밀번호를 설정하세요.</div>

      <div class="field-wrap">
        <input type="password" id="newPwInput" placeholder="새 비밀번호 (8자 이상)" oninput="onNewPwInput()">
        <i class="fa-solid fa-lock field-icon"></i>
        <button class="toggle-pw" onclick="togglePw('newPwInput',this)" tabindex="-1">
          <i class="fa-solid fa-eye-slash"></i>
        </button>
      </div>
      <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwFill"></div></div>
      <div class="pw-strength-label" id="pwStrengthLabel"></div>

      <div class="field-wrap">
        <input type="password" id="newPwConfirm" placeholder="새 비밀번호 확인" oninput="onPwConfirmInput()">
        <i class="fa-solid fa-lock field-icon"></i>
        <button class="toggle-pw" onclick="togglePw('newPwConfirm',this)" tabindex="-1">
          <i class="fa-solid fa-eye-slash"></i>
        </button>
      </div>
      <div class="field-message" id="pwConfirmMsg"></div>

      <button class="btn-primary" id="resetBtn" onclick="resetPassword()" style="margin-top:8px;">
        <span id="resetLabel">비밀번호 변경</span>
        <div class="spinner" id="resetSpinner"></div>
      </button>
    </div>

    <!-- STEP 4: 완료 -->
    <div class="panel" id="panel4">
      <div class="success-circle">✅</div>
      <div class="panel-title" style="margin-bottom:12px;">변경 완료!</div>
      <div class="panel-desc">비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인하세요.</div>

      <button class="btn-primary green-btn" onclick="window.location.href='login.html'" style="margin-top:32px;">
        <i class="fa-solid fa-right-to-bracket"></i>
        로그인 화면으로
      </button>
    </div>

  </div><!-- /panels -->
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── 상태 ── */
  let currentStep = 1;
  let targetEmail = '';
  let generatedCode = '';
  let timerInterval = null;
  let timerSeconds = 180;

  /* ── 뒤로가기 처리 ── */
  function handleBack() {
    if (currentStep === 1) {
      window.location.href = 'login.html';
    } else if (currentStep < 4) {
      goStep(currentStep - 1, 'back');
    }
  }

  /* ── 단계 이동 ── */
  function goStep(n, dir = 'forward') {
    const prev = document.getElementById('panel' + currentStep);
    const next = document.getElementById('panel' + n);

    prev.style.transform = dir === 'forward' ? 'translateX(-40px)' : 'translateX(40px)';
    prev.style.opacity = '0';
    prev.style.pointerEvents = 'none';
    setTimeout(() => { prev.classList.remove('active'); prev.style.transform = ''; prev.style.opacity = ''; }, 350);

    next.style.transform = dir === 'forward' ? 'translateX(40px)' : 'translateX(-40px)';
    next.style.opacity = '0';
    next.classList.add('active');
    requestAnimationFrame(() => {
      next.style.transition = 'none';
      next.offsetHeight; // reflow
      next.style.transition = '';
      next.style.transform = 'translateX(0)';
      next.style.opacity = '1';
    });

    currentStep = n;
    updateStepUI();

    // 완료 화면에서 뒤로가기 버튼 숨김
    document.getElementById('backBtn').style.display = n === 4 ? 'none' : 'flex';
  }

  function updateStepUI() {
    for (let i = 1; i <= 3; i++) {
      const dot   = document.getElementById('dot' + i);
      const label = document.getElementById('lbl' + i);
      dot.className = 'step-dot';
      label.className = 'step-label';

      if (i < currentStep)       { dot.classList.add('done'); dot.textContent = ''; label.classList.add('done'); }
      else if (i === currentStep) { dot.classList.add('active'); dot.textContent = i; label.classList.add('active'); }
      else                       { dot.textContent = i; }
    }
    for (let i = 1; i <= 2; i++) {
      document.getElementById('line' + i).className = 'step-line' + (i < currentStep ? ' done' : '');
    }
  }

  /* ── STEP 1: 이메일 ── */
  function onEmailInput() {
    const val = document.getElementById('emailInput').value;
    const msg = document.getElementById('emailMsg');
    const re  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!val) { msg.textContent = ''; return; }
    if (!re.test(val)) {
      msg.textContent = '올바른 이메일 형식을 입력하세요.';
      msg.className = 'field-message error';
    } else {
      msg.textContent = '';
    }
  }

  function sendCode() {
    const email = document.getElementById('emailInput').value.trim();
    const re    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !re.test(email)) {
      document.getElementById('emailMsg').textContent = '올바른 이메일 주소를 입력하세요.';
      document.getElementById('emailMsg').className = 'field-message error';
      return;
    }

    // 가입된 이메일인지 확인
    const users = JSON.parse(localStorage.getItem('qlog_users') || '[]');
    if (!users.find(u => u.email === email)) {
      document.getElementById('emailMsg').textContent = '등록되지 않은 이메일입니다.';
      document.getElementById('emailMsg').className = 'field-message error';
      return;
    }

    setBtnLoading('sendBtn', 'sendLabel', 'sendSpinner', true);

    setTimeout(() => {
      setBtnLoading('sendBtn', 'sendLabel', 'sendSpinner', false);
      targetEmail = email;

      // 6자리 코드 생성 (실제 서비스에서는 서버 발송)
      generatedCode = String(Math.floor(100000 + Math.random() * 900000));

      // 개발용 — 실제 서비스에서는 이 줄 삭제
      console.log('[DEV] 인증 코드:', generatedCode);
      showToast(`인증 코드가 발송되었습니다.\n(개발 모드: ${generatedCode})`);

      document.getElementById('otpEmail').textContent = targetEmail;
      goStep(2);
      startTimer();
    }, 1400);
  }

  /* ── STEP 2: OTP ── */
  function onOtpInput(idx) {
    const el = document.getElementById('otp' + idx);
    // 두 자리 이상 입력 방지
    if (el.value.length > 1) el.value = el.value.slice(-1);
    if (el.value && idx < 5) document.getElementById('otp' + (idx + 1)).focus();
    document.getElementById('otpMsg').textContent = '';
  }
  function onOtpKeydown(e, idx) {
    if (e.key === 'Backspace' && !document.getElementById('otp' + idx).value && idx > 0) {
      document.getElementById('otp' + (idx - 1)).focus();
    }
  }
  function getOtpValue() {
    return [0,1,2,3,4,5].map(i => document.getElementById('otp' + i).value).join('');
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerSeconds = 180;
    document.getElementById('resendBtn').disabled = true;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timerCount').textContent = '만료됨';
        document.getElementById('timerCount').classList.add('expired');
        document.getElementById('resendBtn').disabled = false;
      }
    }, 1000);
  }
  function updateTimerDisplay() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timerCount').textContent = `${m}:${String(s).padStart(2,'0')}`;
    document.getElementById('timerCount').classList.remove('expired');
  }
  function resendCode() {
    generatedCode = String(Math.floor(100000 + Math.random() * 900000));
    console.log('[DEV] 재전송 코드:', generatedCode);
    showToast(`코드가 재전송되었습니다.\n(개발 모드: ${generatedCode})`);
    startTimer();
    [0,1,2,3,4,5].forEach(i => document.getElementById('otp' + i).value = '');
    document.getElementById('otp0').focus();
  }

  function verifyCode() {
    const entered = getOtpValue();
    if (entered.length < 6) {
      document.getElementById('otpMsg').textContent = '6자리 코드를 모두 입력하세요.';
      document.getElementById('otpMsg').className = 'field-message error';
      return;
    }
    if (timerSeconds <= 0) {
      document.getElementById('otpMsg').textContent = '인증 시간이 만료되었습니다. 재전송 해주세요.';
      document.getElementById('otpMsg').className = 'field-message error';
      return;
    }

    setBtnLoading('verifyBtn', 'verifyLabel', 'verifySpinner', true);
    setTimeout(() => {
      setBtnLoading('verifyBtn', 'verifyLabel', 'verifySpinner', false);
      if (entered === generatedCode) {
        clearInterval(timerInterval);
        // OTP 칸 색상 처리
        [0,1,2,3,4,5].forEach(i => {
          const el = document.getElementById('otp' + i);
          el.classList.add('ok-field');
        });
        setTimeout(() => goStep(3), 600);
      } else {
        document.getElementById('otpMsg').textContent = '인증 코드가 올바르지 않습니다.';
        document.getElementById('otpMsg').className = 'field-message error';
        [0,1,2,3,4,5].forEach(i => document.getElementById('otp' + i).classList.add('error-field'));
        setTimeout(() => {
          [0,1,2,3,4,5].forEach(i => {
            document.getElementById('otp' + i).classList.remove('error-field');
            document.getElementById('otp' + i).value = '';
          });
          document.getElementById('otp0').focus();
        }, 800);
      }
    }, 900);
  }

  /* ── STEP 3: 새 비밀번호 ── */
  function onNewPwInput() {
    const val   = document.getElementById('newPwInput').value;
    const fill  = document.getElementById('pwFill');
    const label = document.getElementById('pwStrengthLabel');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#f03e3e','#f76707','#f59f00','#20c997'];
    const labels = ['매우 약함','약함','보통','강함'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = val ? (colors[score-1] || '#e5e8eb') : '#e5e8eb';
    label.textContent = val ? `비밀번호 강도: ${labels[score-1] || ''}` : '';
  }
  function onPwConfirmInput() {
    const pw  = document.getElementById('newPwInput').value;
    const pw2 = document.getElementById('newPwConfirm').value;
    const msg = document.getElementById('pwConfirmMsg');
    if (!pw2) { msg.textContent = ''; return; }
    if (pw !== pw2) {
      msg.textContent = '비밀번호가 일치하지 않습니다.';
      msg.className = 'field-message error';
    } else {
      msg.textContent = '비밀번호가 일치합니다.';
      msg.className = 'field-message ok';
    }
  }
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const icon  = btn.querySelector('i');
    const hide  = input.type === 'password';
    input.type  = hide ? 'text' : 'password';
    icon.className = hide ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
  }

  function resetPassword() {
    const pw  = document.getElementById('newPwInput').value;
    const pw2 = document.getElementById('newPwConfirm').value;
    if (!pw || pw.length < 8) { showToast('8자 이상의 비밀번호를 입력하세요.'); return; }
    if (pw !== pw2)            { showToast('비밀번호가 일치하지 않습니다.'); return; }

    setBtnLoading('resetBtn', 'resetLabel', 'resetSpinner', true);
    setTimeout(() => {
      setBtnLoading('resetBtn', 'resetLabel', 'resetSpinner', false);

      // localStorage 업데이트
      const users = JSON.parse(localStorage.getItem('qlog_users') || '[]');
      const idx   = users.findIndex(u => u.email === targetEmail);
      if (idx !== -1) { users[idx].pw = pw; localStorage.setItem('qlog_users', JSON.stringify(users)); }

      goStep(4);
    }, 1200);
  }

  /* ── 공통 유틸 ── */
  function setBtnLoading(btnId, labelId, spinnerId, on) {
    document.getElementById(btnId).disabled     = on;
    document.getElementById(labelId).style.display  = on ? 'none' : 'inline';
    document.getElementById(spinnerId).style.display = on ? 'block' : 'none';
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }
</script>
</body>
