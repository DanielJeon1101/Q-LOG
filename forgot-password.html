<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Q-Log | 비밀번호 찾기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root {
    --blue: #3182f6; --blue-hover: #1b64da;
    --bg: #f2f4f6; --white: #ffffff;
    --text: #191f28; --sub: #8b95a1;
    --border: #e5e8eb; --radius: 12px;
    --error: #f03e3e; --ok: #20c997;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Segoe UI', sans-serif; }
body {
    background: var(--bg); min-height: 100vh;
    display: flex; justify-content: center; color: var(--text);
}
.app-container {
    width: 100%; max-width: 480px; min-height: 100vh;
    background: var(--white); box-shadow: 0 0 20px rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
}

/* 헤더 */
.top-bar {
    display: flex; align-items: center;
    padding: 20px 20px 0; gap: 12px;
}
.back-btn {
    width: 38px; height: 38px; background: var(--bg);
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text);
    flex-shrink: 0; transition: background 0.15s;
}
.back-btn:hover { background: #e5e8eb; }
.top-title { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }

/* 단계 인디케이터 */
.step-bar {
    display: flex; align-items: center; justify-content: center;
    padding: 24px 40px 0; gap: 0;
}
.step-dot {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--sub); background: white;
    transition: all 0.35s ease; flex-shrink: 0; z-index: 1;
}
.step-dot.active { border-color: var(--blue); background: var(--blue); color: white; box-shadow: 0 0 0 4px rgba(49,130,246,0.14); }
.step-dot.done   { border-color: var(--ok);   background: var(--ok);   color: white; }
.step-line { flex: 1; max-width: 60px; height: 2px; background: var(--border); margin: 0 6px; transition: background 0.35s; }
.step-line.done { background: var(--ok); }

.step-labels {
    display: flex; justify-content: space-between;
    padding: 8px 28px 0; font-size: 11px; color: var(--sub);
}
.step-labels span { text-align: center; width: 70px; transition: color 0.3s; }
.step-labels span.active { color: var(--blue); font-weight: 700; }
.step-labels span.done   { color: var(--ok); }

/* 패널 슬라이드 */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel {
    position: absolute; inset: 0;
    padding: 36px 24px 40px;
    opacity: 0; transform: translateX(32px);
    pointer-events: none;
    transition: opacity 0.32s ease, transform 0.32s ease;
}
.panel.active { opacity: 1; transform: translateX(0); pointer-events: auto; position: relative; }

/* 패널 공통 */
.panel-emoji { font-size: 44px; text-align: center; margin-bottom: 16px; }
.panel-title { font-size: 22px; font-weight: 800; text-align: center; letter-spacing: -0.5px; margin-bottom: 8px; }
.panel-desc  { font-size: 14px; color: var(--sub); text-align: center; line-height: 1.7; margin-bottom: 28px; }
.panel-desc b { color: var(--blue); }

/* 입력 */
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 6px; letter-spacing: 0.3px; text-transform: uppercase; }
.field input {
    width: 100%; height: 50px; padding: 0 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
}
.field input::placeholder { color: var(--sub); }
.field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,130,246,0.12); }
.field input.ok    { border-color: var(--ok);    box-shadow: 0 0 0 3px rgba(32,201,151,0.12); }
.field input.error { border-color: var(--error);  box-shadow: 0 0 0 3px rgba(240,62,62,0.1); }

.field-msg { font-size: 12px; padding-left: 4px; min-height: 18px; margin-top: 4px; }
.field-msg.ok    { color: var(--ok); }
.field-msg.error { color: var(--error); }

/* 버튼 */
.btn-primary {
    width: 100%; height: 50px;
    background: var(--blue); color: white;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(49,130,246,0.26);
    transition: background 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
}
.btn-primary:hover  { background: var(--blue-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { background: #b0c4e8; box-shadow: none; cursor: not-allowed; }
.btn-primary.green  { background: var(--ok); box-shadow: 0 4px 14px rgba(32,201,151,0.26); }
.btn-primary.green:hover { background: #12b886; }

.spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.back-link-row { text-align: center; margin-top: 18px; }
.back-link-row a { font-size: 13px; color: var(--sub); text-decoration: none; }
.back-link-row a:hover { color: var(--blue); }

/* 성공 원 */
.success-ring {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #e6fcf5, #c3fae8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 20px;
    animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* 토스트 */
.toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--text); color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap; z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 🌙 다크모드 */
body.dark-mode { background: #121212 !important; }
body.dark-mode .app-container { background: #1e1e1e !important; }
body.dark-mode .top-title { color: #e8eaed !important; }
body.dark-mode .back-btn { background: #333 !important; color: #e8eaed !important; }
body.dark-mode .panel-title { color: #e8eaed !important; }
body.dark-mode .panel-desc { color: #9aa0a6 !important; }
body.dark-mode .field label { color: #9aa0a6 !important; }
body.dark-mode .field input {
    background: #2a2a2a !important;
    border-color: #3c4043 !important;
    color: #e8eaed !important;
}
body.dark-mode .step-dot { background: #2a2a2a !important; border-color: #3c4043 !important; color: #9aa0a6 !important; }
body.dark-mode .step-dot.active { background: #3182f6 !important; border-color: #3182f6 !important; color: white !important; }
body.dark-mode .step-labels span { color: #9aa0a6 !important; }
</style>
</head>
<body class="">
<script>if(localStorage.getItem('qlog_dark')==='1')document.body.classList.add('dark-mode');</script>
<div class="app-container">

    <!-- 헤더 -->
    <div class="top-bar">
        <button class="back-btn" id="backBtn">←</button>
        <span class="top-title">비밀번호 찾기</span>
    </div>

    <!-- 단계 표시 -->
    <div class="step-bar">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot" id="dot2">2</div>
    </div>
    <div class="step-labels">
        <span class="active" id="lbl1">이메일 입력</span>
        <span id="lbl2">완료</span>
    </div>

    <div class="panels">

        <!-- STEP 1: 이메일 입력 -->
        <div class="panel active" id="panel1">
            <div class="panel-emoji">📧</div>
            <div class="panel-title">이메일 주소 입력</div>
            <div class="panel-desc">
                가입 시 사용한 이메일을 입력하면<br>비밀번호 재설정 링크를 보내드립니다.
            </div>

            <div class="field">
                <label>이메일</label>
                <input type="email" id="emailInput" placeholder="example@mail.com" autocomplete="email">
                <div class="field-msg" id="emailMsg"></div>
            </div>

            <button class="btn-primary" id="sendBtn">
                <span id="sendLabel">재설정 링크 보내기</span>
                <div class="spinner" id="sendSpinner"></div>
            </button>

            <div class="back-link-row">
                <a href="login.html">← 로그인으로 돌아가기</a>
            </div>
        </div>

        <!-- STEP 2: 완료 -->
        <div class="panel" id="panel2">
            <div class="success-ring">✅</div>
            <div class="panel-title">이메일을 확인하세요</div>
            <div class="panel-desc">
                <b id="sentEmail"></b>로<br>비밀번호 재설정 링크를 보냈습니다.<br><br>
                메일함을 확인하고 링크를 클릭해<br>비밀번호를 새로 설정하세요.
            </div>

            <button class="btn-primary green" onclick="location.href='login.html'">
                로그인 화면으로
            </button>

            <div class="back-link-row" style="margin-top:14px;">
                <a href="#" id="resendLink">메일이 안 왔나요? 다시 보내기</a>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<!-- ★ Firebase 연동 -->
<script type="module">
import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail }
                                 from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey:            "AIzaSyCYkG8uZUET5UnW80IHKGxhL7WpNCp7kfQ",
    authDomain:        "q-log-f6aed.firebaseapp.com",
    projectId:         "q-log-f6aed",
    storageBucket:     "q-log-f6aed.firebasestorage.app",
    messagingSenderId: "373152234648",
    appId:             "1:373152234648:web:aa2d94664a5674aca9e4ed"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ── 단계 이동 ── */
let currentStep = 1;

function goStep(n) {
    const prev = document.getElementById('panel' + currentStep);
    const next = document.getElementById('panel' + n);
    prev.style.opacity = '0'; prev.style.transform = 'translateX(-32px)'; prev.style.pointerEvents = 'none';
    setTimeout(() => { prev.classList.remove('active'); prev.style.transform = ''; prev.style.opacity = ''; }, 320);
    next.style.transform = 'translateX(32px)'; next.style.opacity = '0';
    next.classList.add('active');
    requestAnimationFrame(() => {
        next.style.transition = 'none'; next.offsetHeight;
        next.style.transition = ''; next.style.transform = 'translateX(0)'; next.style.opacity = '1';
    });
    currentStep = n;
    updateStepUI();
    if (n === 2) document.getElementById('backBtn').style.display = 'none';
}

function updateStepUI() {
    for (let i = 1; i <= 2; i++) {
        const dot = document.getElementById('dot' + i);
        const lbl = document.getElementById('lbl' + i);
        dot.className = 'step-dot'; lbl.className = '';
        if (i < currentStep)       { dot.classList.add('done'); dot.textContent = '✓'; lbl.classList.add('done'); }
        else if (i === currentStep) { dot.classList.add('active'); dot.textContent = i; lbl.classList.add('active'); }
        else                       { dot.textContent = i; }
    }
    const line = document.getElementById('line1');
    line.className = 'step-line' + (currentStep > 1 ? ' done' : '');
}

/* ── 뒤로가기 ── */
document.getElementById('backBtn').addEventListener('click', () => {
    if (currentStep === 1) location.href = 'login.html';
    else goStep(currentStep - 1);
});

/* ── 이메일 유효성 ── */
const emailInput = document.getElementById('emailInput');
emailInput.addEventListener('input', () => {
    const msg = document.getElementById('emailMsg');
    const re  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailInput.value) { msg.textContent = ''; emailInput.className = ''; return; }
    if (!re.test(emailInput.value)) {
        msg.textContent = '올바른 이메일 형식을 입력하세요.'; msg.className = 'field-msg error';
        emailInput.classList.add('error'); emailInput.classList.remove('ok');
    } else {
        msg.textContent = ''; emailInput.classList.add('ok'); emailInput.classList.remove('error');
    }
});

/* ── 재설정 메일 발송 (Firebase) ── */
async function sendReset(email) {
    const btn     = document.getElementById('sendBtn');
    const label   = document.getElementById('sendLabel');
    const spinner = document.getElementById('sendSpinner');

    btn.disabled = true; label.style.display = 'none'; spinner.style.display = 'block';

    try {
        // ★ Firebase sendPasswordResetEmail 호출
        await sendPasswordResetEmail(auth, email, {
            // 재설정 완료 후 이동할 URL (Firebase Console에서 도메인 허용 필요)
            url: window.location.origin + '/login.html'
        });

        document.getElementById('sentEmail').textContent = email;
        goStep(2);

    } catch (err) {
        console.error(err);
        let msg = '이메일 발송에 실패했습니다.';
        if (err.code === 'auth/user-not-found')    msg = '등록되지 않은 이메일입니다.';
        if (err.code === 'auth/invalid-email')     msg = '이메일 형식이 올바르지 않습니다.';
        if (err.code === 'auth/too-many-requests') msg = '요청이 너무 많습니다. 잠시 후 다시 시도하세요.';
        showToast(msg);

        btn.disabled = false; label.style.display = 'inline'; spinner.style.display = 'none';
    }
}

document.getElementById('sendBtn').addEventListener('click', () => {
    const email = emailInput.value.trim();
    const re    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !re.test(email)) {
        document.getElementById('emailMsg').textContent = '올바른 이메일 주소를 입력하세요.';
        document.getElementById('emailMsg').className = 'field-msg error';
        return;
    }
    sendReset(email);
});

/* 재전송 */
document.getElementById('resendLink').addEventListener('click', (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) { goStep(1); return; }
    sendReset(email);
});

/* 엔터키 */
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sendBtn').click(); });

/* ── 토스트 ── */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
