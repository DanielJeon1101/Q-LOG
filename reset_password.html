<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Q-Log | 비밀번호 변경</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
/* ── 디자인 토큰 ── */
:root {
    --blue:        #3182f6;
    --blue-hover:  #1b64da;
    --bg:          #f2f4f6;
    --white:       #ffffff;
    --text:        #191f28;
    --sub:         #8b95a1;
    --border:      #e5e8eb;
    --error:       #f03e3e;
    --ok:          #20c997;
    --radius:      12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Segoe UI', sans-serif; }

body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    color: var(--text);
}

.app-container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--white);
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
}

/* ── 상단 헤더 ── */
.top-bar {
    display: flex;
    align-items: center;
    padding: 20px 20px 0;
    gap: 12px;
    flex-shrink: 0;
}
.back-btn {
    width: 38px; height: 38px;
    background: var(--bg); border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; color: var(--text);
    flex-shrink: 0; transition: background 0.15s;
}
.back-btn:hover { background: #e5e8eb; }
.top-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.4px;
}

/* ── 메인 영역 ── */
.content {
    flex: 1;
    padding: 32px 24px 48px;
    display: flex;
    flex-direction: column;
}

/* 아이콘 + 타이틀 */
.page-icon {
    font-size: 44px;
    text-align: center;
    margin-bottom: 14px;
}
.page-title {
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}
.page-desc {
    font-size: 14px;
    color: var(--sub);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 32px;
}
.page-desc b { color: var(--blue); }

/* ── 상태 패널 (로그인 감지 전 / 후 / 완료) ── */
.panel { display: none; flex-direction: column; }
.panel.active { display: flex; }

/* ── 입력 필드 ── */
.field { margin-bottom: 16px; }
.field label {
    display: block;
    font-size: 12px; font-weight: 700; color: var(--sub);
    margin-bottom: 7px; letter-spacing: 0.3px; text-transform: uppercase;
}
.field-wrap {
    position: relative; display: flex; align-items: center;
}
.field-icon {
    position: absolute; left: 14px;
    color: var(--sub); font-size: 15px; pointer-events: none;
    transition: color 0.2s;
}
.field-wrap:focus-within .field-icon { color: var(--blue); }

input[type="password"],
input[type="text"] {
    width: 100%; height: 50px;
    padding: 0 48px 0 42px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px; color: var(--text); background: white;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
}
input::placeholder { color: var(--sub); }
input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(49,130,246,0.12);
}
input.field-error {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(240,62,62,0.1);
}
input.field-ok {
    border-color: var(--ok);
    box-shadow: 0 0 0 3px rgba(32,201,151,0.1);
}
.toggle-pw {
    position: absolute; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--sub); font-size: 15px; padding: 4px;
    transition: color 0.2s;
}
.toggle-pw:hover { color: var(--text); }

/* 비밀번호 강도 바 */
.pw-strength-wrap { margin-top: -8px; margin-bottom: 8px; }
.pw-strength-bar {
    height: 4px; border-radius: 2px;
    background: var(--border); overflow: hidden;
}
.pw-strength-fill {
    height: 100%; border-radius: 2px;
    width: 0%; transition: width 0.3s, background 0.3s;
}
.pw-strength-label {
    font-size: 11px; color: var(--sub); margin-top: 4px;
}

/* 필드 메시지 */
.field-msg {
    font-size: 12px; padding-left: 2px; min-height: 18px; margin-top: 5px;
}
.field-msg.error { color: var(--error); }
.field-msg.ok    { color: var(--ok); }

/* ── 버튼 ── */
.btn-primary {
    width: 100%; height: 50px;
    background: var(--blue); color: white;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(49,130,246,0.28);
    transition: background 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
}
.btn-primary:hover  { background: var(--blue-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled {
    background: #b0c4e8; box-shadow: none; cursor: not-allowed;
}
.btn-secondary {
    width: 100%; height: 50px;
    background: var(--bg); color: var(--text);
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
    margin-top: 10px;
}
.btn-secondary:hover { background: #e5e8eb; }

/* 로딩 스피너 */
.spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 성공 화면 ── */
.success-icon {
    width: 88px; height: 88px;
    background: linear-gradient(135deg, #e6fcf5, #c3fae8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 20px;
    animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}

/* ── 비로그인 안내 ── */
.not-logged-in {
    text-align: center; padding: 20px 0;
}
.not-logged-in .icon { font-size: 48px; margin-bottom: 16px; }
.not-logged-in p {
    font-size: 15px; color: var(--sub); line-height: 1.7; margin-bottom: 24px;
}

/* ── 토스트 ── */
.toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--text); color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap; z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="app-container">

    <!-- 상단 헤더 -->
    <div class="top-bar">
        <button class="back-btn" id="backBtn" onclick="history.back()">←</button>
        <span class="top-title">비밀번호 변경</span>
    </div>

    <div class="content">

        <!-- ① 로그인 확인 중 -->
        <div class="panel active" id="panelLoading">
            <div class="page-icon">⏳</div>
            <div class="page-title">확인 중...</div>
            <div class="page-desc">로그인 상태를 확인하고 있어요.</div>
        </div>

        <!-- ② 비로그인 -->
        <div class="panel" id="panelNotLoggedIn">
            <div class="not-logged-in">
                <div class="icon">🔒</div>
                <p>비밀번호를 변경하려면<br>먼저 로그인해야 합니다.</p>
                <button class="btn-primary" onclick="location.href='login.html'">
                    로그인하기
                </button>
            </div>
        </div>

        <!-- ③ Google 계정 (비밀번호 없음) -->
        <div class="panel" id="panelGoogle">
            <div class="page-icon">🔑</div>
            <div class="page-title">변경 불가</div>
            <div class="page-desc">
                <b>Google 계정</b>으로 로그인되어 있어요.<br>
                비밀번호는 Google 계정에서 직접 관리됩니다.
            </div>
            <a href="https://myaccount.google.com/security" target="_blank" rel="noopener">
                <button class="btn-primary" style="margin-top:0;">Google 계정 보안 설정 열기</button>
            </a>
            <button class="btn-secondary" onclick="history.back()">돌아가기</button>
        </div>

        <!-- ④ 비밀번호 변경 폼 (이메일 로그인 유저) -->
        <div class="panel" id="panelForm">
            <div class="page-icon">🔐</div>
            <div class="page-title">새 비밀번호 설정</div>
            <div class="page-desc" id="formDesc">
                이전과 다른 안전한 새 비밀번호를 설정하세요.
            </div>

            <!-- 현재 비밀번호 (재인증용) -->
            <div class="field">
                <label>현재 비밀번호</label>
                <div class="field-wrap">
                    <input type="password" id="currentPw" placeholder="현재 비밀번호 입력">
                    <span class="field-icon">🔒</span>
                    <button class="toggle-pw" type="button" data-target="currentPw">👁</button>
                </div>
                <div class="field-msg" id="currentPwMsg"></div>
            </div>

            <!-- 새 비밀번호 -->
            <div class="field">
                <label>새 비밀번호</label>
                <div class="field-wrap">
                    <input type="password" id="newPw" placeholder="새 비밀번호 (8자 이상)" oninput="onNewPwInput()">
                    <span class="field-icon">🔑</span>
                    <button class="toggle-pw" type="button" data-target="newPw">👁</button>
                </div>
                <div class="pw-strength-wrap">
                    <div class="pw-strength-bar">
                        <div class="pw-strength-fill" id="pwStrengthFill"></div>
                    </div>
                    <div class="pw-strength-label" id="pwStrengthLabel"></div>
                </div>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="field">
                <label>새 비밀번호 확인</label>
                <div class="field-wrap">
                    <input type="password" id="confirmPw" placeholder="새 비밀번호 재입력" oninput="onConfirmPwInput()">
                    <span class="field-icon">🔑</span>
                    <button class="toggle-pw" type="button" data-target="confirmPw">👁</button>
                </div>
                <div class="field-msg" id="confirmPwMsg"></div>
            </div>

            <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">
                <span id="submitLabel">비밀번호 변경</span>
                <div class="spinner" id="submitSpinner"></div>
            </button>
            <button class="btn-secondary" onclick="history.back()">취소</button>
        </div>

        <!-- ⑤ 완료 화면 -->
        <div class="panel" id="panelDone">
            <div class="success-icon">✅</div>
            <div class="page-title">변경 완료!</div>
            <div class="page-desc">
                비밀번호가 성공적으로 변경되었습니다.<br>
                다음 로그인부터 새 비밀번호를 사용하세요.
            </div>
            <button class="btn-primary" style="margin-top:8px;" onclick="location.href='index.html'">
                홈으로 돌아가기
            </button>
        </div>

    </div><!-- /content -->
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    EmailAuthProvider,
    reauthenticateWithCredential,
    updatePassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ── Firebase 초기화 ── */
const firebaseConfig = {
    apiKey:            "AIzaSyCYkG8uZUET5UnW80IHKGxhL7WpNCp7kfQ",
    authDomain:        "q-log-f6aed.firebaseapp.com",
    projectId:         "q-log-f6aed",
    storageBucket:     "q-log-f6aed.firebasestorage.app",
    messagingSenderId: "373152234648",
    appId:             "1:373152234648:web:aa2d94664a5674aca9e4ed"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

/* ── 패널 전환 ── */
function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ── 로그인 상태 감지 → 알맞은 패널 표시 ── */
onAuthStateChanged(auth, (user) => {
    if (!user) {
        showPanel('panelNotLoggedIn');
        return;
    }
    currentUser = user;

    // Google 계정인지 확인
    const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
    if (isGoogle) {
        showPanel('panelGoogle');
        return;
    }

    // 이메일/비밀번호 계정 → 폼 표시
    document.getElementById('formDesc').innerHTML =
        `<b>${user.email}</b> 계정의<br>새 비밀번호를 설정하세요.`;
    showPanel('panelForm');
});

/* ── 비밀번호 강도 계산 ── */
window.onNewPwInput = function() {
    const val   = document.getElementById('newPw').value;
    const fill  = document.getElementById('pwStrengthFill');
    const label = document.getElementById('pwStrengthLabel');
    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))          score++;
    if (/[0-9]/.test(val))          score++;
    if (/[^A-Za-z0-9]/.test(val))   score++;
    const colors = ['#f03e3e', '#f76707', '#f59e0b', '#20c997'];
    const labels = ['매우 약함', '약함', '보통', '강함'];
    fill.style.width      = (score * 25) + '%';
    fill.style.background = val ? (colors[score - 1] || '#e5e8eb') : '#e5e8eb';
    label.textContent     = val ? `강도: ${labels[score - 1] || ''}` : '';
    // 새 비밀번호 바뀌면 확인도 다시 검증
    onConfirmPwInput();
};

window.onConfirmPwInput = function() {
    const pw  = document.getElementById('newPw').value;
    const pw2 = document.getElementById('confirmPw').value;
    const msg = document.getElementById('confirmPwMsg');
    const el  = document.getElementById('confirmPw');
    if (!pw2) { msg.textContent = ''; el.className = ''; return; }
    if (pw !== pw2) {
        msg.textContent = '비밀번호가 일치하지 않습니다.';
        msg.className   = 'field-msg error';
        el.classList.add('field-error'); el.classList.remove('field-ok');
    } else {
        msg.textContent = '비밀번호가 일치합니다.';
        msg.className   = 'field-msg ok';
        el.classList.add('field-ok'); el.classList.remove('field-error');
    }
};

/* ── 토글 보기 ── */
document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
        else                           { input.type = 'password'; btn.textContent = '👁'; }
    });
});

/* ── 제출 ── */
window.handleSubmit = async function() {
    if (!currentUser) return;

    const currentPwVal = document.getElementById('currentPw').value;
    const newPwVal     = document.getElementById('newPw').value;
    const confirmPwVal = document.getElementById('confirmPw').value;
    const currentPwMsg = document.getElementById('currentPwMsg');

    // 빈칸 체크
    if (!currentPwVal) {
        currentPwMsg.textContent = '현재 비밀번호를 입력하세요.';
        currentPwMsg.className   = 'field-msg error';
        document.getElementById('currentPw').classList.add('field-error');
        return;
    }
    if (!newPwVal || newPwVal.length < 8) {
        showToast('새 비밀번호는 8자 이상이어야 합니다.');
        return;
    }
    if (newPwVal !== confirmPwVal) {
        showToast('새 비밀번호가 일치하지 않습니다.');
        return;
    }
    if (currentPwVal === newPwVal) {
        showToast('현재 비밀번호와 동일합니다. 다른 비밀번호를 입력하세요.');
        return;
    }

    setLoading(true);

    try {
        // 1️⃣ 재인증 (보안 민감 작업 전 필수)
        const credential = EmailAuthProvider.credential(currentUser.email, currentPwVal);
        await reauthenticateWithCredential(currentUser, credential);

        // 2️⃣ 비밀번호 변경
        await updatePassword(currentUser, newPwVal);

        setLoading(false);
        showPanel('panelDone');

    } catch (err) {
        setLoading(false);
        console.error(err);

        // 에러 코드별 한국어 안내
        if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
            currentPwMsg.textContent = '현재 비밀번호가 올바르지 않습니다.';
            currentPwMsg.className   = 'field-msg error';
            document.getElementById('currentPw').classList.add('field-error');
        } else if (err.code === 'auth/too-many-requests') {
            showToast('시도 횟수 초과. 잠시 후 다시 시도하세요.');
        } else if (err.code === 'auth/weak-password') {
            showToast('비밀번호가 너무 약합니다. 더 강한 비밀번호를 입력하세요.');
        } else if (err.code === 'auth/requires-recent-login') {
            showToast('보안을 위해 다시 로그인 후 시도해주세요.');
            setTimeout(() => location.href = 'login.html', 2000);
        } else {
            showToast('오류가 발생했습니다: ' + err.message);
        }
    }
};

/* ── 로딩 상태 ── */
function setLoading(on) {
    const btn     = document.getElementById('submitBtn');
    const label   = document.getElementById('submitLabel');
    const spinner = document.getElementById('submitSpinner');
    btn.disabled          = on;
    label.style.display   = on ? 'none'  : 'inline';
    spinner.style.display = on ? 'block' : 'none';
}

/* ── 토스트 ── */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── 엔터 제출 ── */
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSubmit();
});
</script>
</body>
</html>
