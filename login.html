<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-Log | 로그인</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #555; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: black;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            text-decoration: none;
        }
        .register-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            text-decoration: none;
        }
        .register-link span {
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>로그인</h2>

    <div class="input-group">
        <label>이메일</label>
        <input type="email" placeholder="example@mail.com" id="email">
    </div>
    <div class="input-group">
        <label>비밀번호</label>
        <input type="password" placeholder="비밀번호를 입력하세요" id="password">
    </div>

    <button type="button" id="mainBtn">로그인</button>

    <a href="register.html" class="register-link">계정이 없으신가요? <span>회원가입</span></a>
    <a href="index.html" class="back-link">돌아가기</a>
</div>

<script type="module" src="Login.js"></script>
</body>
</html>
